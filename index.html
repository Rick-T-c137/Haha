    <title>战地记录</title>

    <script> // 粒子背景动画脚本
        // 粒子参数
        const PARTICLE_COLOR = "#6fa8dc";
        const PARTICLE_RADIUS = 2;
        const LINE_DISTANCE = 120;

        // 动态计算粒子数量
        const PARTICLE_NUM = window.innerWidth < 768
            ? Math.floor(130 * 0.6)  // 移动端用78个粒子（原130的60%）
            : 130;                    // PC端保持130个

        let canvas, ctx, particles = [];

        window.onload = function () {
            // 创建canvas
            canvas = document.createElement('canvas');
            canvas.id = 'particles-js';
            document.body.appendChild(canvas);
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 初始化粒子
            particles = []; // 清空旧粒子
            for (let i = 0; i < PARTICLE_NUM; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 1.2,
                    vy: (Math.random() - 0.5) * 1.2
                });
            }
            animate();
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            particles.forEach(p => {
                p.x = Math.random() * canvas.width;
                p.y = Math.random() * canvas.height;
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制粒子
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, PARTICLE_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = PARTICLE_COLOR;
                ctx.fill();

                // 移动和边界检测
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            }

            // 绘制连线
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let p1 = particles[i], p2 = particles[j];
                    let dx = p1.x - p2.x, dy = p1.y - p2.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < LINE_DISTANCE) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = "rgba(111,168,220," + (1 - dist / LINE_DISTANCE) + ")";
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
    </script>
