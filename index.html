    <style>
        body {

        }

        #particles-js {
            position: fixed;

        h1 {

            width: 60%;

            border-radius: 2px;
            box-shadow: 0 2px 8px #6fa8dc55;
        }

        p {

            color: #f1f1f1;

            margin: 16px 0;
            text-shadow: 0 1px 4px #222;
        }

        a {
            display: block;
            text-align: center;
            color: #fff;
            font-size: 1.3em;
            margin: 24px auto;
            text-decoration: none;
            background-color: #6fa8dccc;
            padding: 12px 0;
            width: 220px;
            border-radius: 30px;
            box-shadow: 0 2px 12px #6fa8dc55;
            transition: background 0.3s, color 0.3s, box-shadow 0.3s;
        }

        a:hover {
            color: #111;
            background-color: #6fa8dccc;
            transform: scale(1.05) translateY(-2px);

        }

        video {
            display: block;
            margin: 28px auto;
            width: 85%;
            max-width: 900px;
            border: 3px solid #6fa8dc;
            border-radius: 18px;
            box-shadow: 0 4px 24px #6fa8dc55;
            background: #111;
        }

        img {
            display: block;
            margin: 28px auto;
            width: 85%;
            max-width: 900px;
            border: 3px solid #6fa8dc;
            border-radius: 18px;
            box-shadow: 0 4px 24px #6fa8dc55;
            background: #111;
        }
    </style>
    <script>
        // 粒子参数
        const PARTICLE_NUM = 100;
        const PARTICLE_COLOR = "#6fa8dc";
        const PARTICLE_RADIUS = 1.5;
        const LINE_DISTANCE = 130;

        let canvas, ctx, particles = [];

        window.onload = function () {
            // 创建canvas
            canvas = document.createElement('canvas');
            canvas.id = 'particles-js';
            document.body.appendChild(canvas);
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 初始化粒子
            for (let i = 0; i < PARTICLE_NUM; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 1.2,
                    vy: (Math.random() - 0.5) * 1.2
                });
            }
            animate();
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制粒子
            for (let i = 0; i < PARTICLE_NUM; i++) {
                let p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, PARTICLE_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = PARTICLE_COLOR;
                ctx.fill();
                // 移动
                p.x += p.vx;
                p.y += p.vy;
                // 边界反弹
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            }

            // 绘制连线
            for (let i = 0; i < PARTICLE_NUM; i++) {
                for (let j = i + 1; j < PARTICLE_NUM; j++) {
                    let p1 = particles[i], p2 = particles[j];
                    let dx = p1.x - p2.x, dy = p1.y - p2.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < LINE_DISTANCE) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = "rgba(111,168,220," + (1 - dist / LINE_DISTANCE) + ")";
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }
    </script>

</head>
